name: Build and Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sanitize Docker Hub Username
        id: sanitize
        run: echo "username=$(echo '${{ secrets.DOCKER_HUB_USERNAME }}' | xargs)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.sanitize.outputs.username }}/nnrd-generator:latest
            ${{ steps.sanitize.outputs.username }}/nnrd-generator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Sanitize Docker Hub Username
        id: sanitize
        run: echo "username=$(echo '${{ secrets.DOCKER_HUB_USERNAME }}' | xargs)" >> $GITHUB_OUTPUT

      - name: 'Configure Azure App Service for Containers'
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          app-settings-json: |
            [
              {
                "name": "DOCKER_REGISTRY_SERVER_URL",
                "value": "https://index.docker.io/v1/",
                "slotSetting": false
              }
            ]
          general-settings-json: |
            {
              "linuxFxVersion": "DOCKER|${{ steps.sanitize.outputs.username }}/nnrd-generator:${{ github.sha }}"
            }

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: '${{ steps.sanitize.outputs.username }}/nnrd-generator:${{ github.sha }}'
